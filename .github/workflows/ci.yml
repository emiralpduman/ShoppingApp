name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Create Firebase config placeholder
        run: |
          cat > "Shopping App/App/Plists/GoogleService-Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>API_KEY</key>
            <string>ci-placeholder</string>
            <key>GCM_SENDER_ID</key>
            <string>000000000000</string>
            <key>PLIST_VERSION</key>
            <string>1</string>
            <key>BUNDLE_ID</key>
            <string>duman.emiralp.Shopping-App</string>
            <key>PROJECT_ID</key>
            <string>ci-placeholder</string>
            <key>STORAGE_BUCKET</key>
            <string>ci-placeholder.appspot.com</string>
            <key>IS_ADS_ENABLED</key>
            <false/>
            <key>IS_ANALYTICS_ENABLED</key>
            <false/>
            <key>IS_APPINVITE_ENABLED</key>
            <true/>
            <key>IS_GCM_ENABLED</key>
            <true/>
            <key>IS_SIGNIN_ENABLED</key>
            <true/>
            <key>GOOGLE_APP_ID</key>
            <string>1:000000000000:ios:ci-placeholder</string>
          </dict>
          </plist>
          PLIST

      - name: Prepare Simulator
        run: |
          # Kill any stuck CoreSimulator processes
          killall -9 com.apple.CoreSimulator.CoreSimulatorService 2>/dev/null || true
          # Remove zombie/unavailable simulator clones left from previous runs
          xcrun simctl delete unavailable 2>/dev/null || true
          # Erase simulator content to clear stale Realm FIFO named pipes
          # (these pipes cause "Failed to clone device" errors)
          xcrun simctl shutdown all 2>/dev/null || true
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          for runtime,devices in data['devices'].items():
              for d in devices:
                  if 'iPhone 16' in d['name'] and d['isAvailable']:
                      print(d['udid']); sys.exit(0)
          ")
          if [ -n "$DEVICE_ID" ]; then
            xcrun simctl erase "$DEVICE_ID" 2>/dev/null || true
          fi

      - name: Build
        id: build
        run: |
          xcodebuild -workspace "Shopping App.xcworkspace" \
            -scheme "Shopping App" \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test Shopping App
        run: |
          xcodebuild -workspace "Shopping App.xcworkspace" \
            -scheme "Shopping App" \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            -parallel-testing-enabled NO \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults/ShoppingApp.xcresult \
            -skip-testing "Shopping App UITests" \
            test

      - name: Test Shopping App API
        if: always() && steps.build.outcome == 'success'
        run: |
          xcodebuild -workspace "Shopping App.xcworkspace" \
            -scheme "Shopping App API" \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            -parallel-testing-enabled NO \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults/ShoppingAppAPI.xcresult \
            test

      - name: Export coverage from xcresult
        if: always() && steps.build.outcome == 'success'
        run: |
          if [ -d TestResults/ShoppingApp.xcresult ]; then
            xcrun xccov view --report --json \
              TestResults/ShoppingApp.xcresult > TestResults/app-coverage.json
          fi
          if [ -d TestResults/ShoppingAppAPI.xcresult ]; then
            xcrun xccov view --report --json \
              TestResults/ShoppingAppAPI.xcresult > TestResults/api-coverage.json
          fi

      - name: Upload App coverage to Codecov
        if: always() && steps.build.outcome == 'success'
        uses: codecov/codecov-action@v5
        with:
          files: TestResults/app-coverage.json
          flags: app
          disable_search: true
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload API coverage to Codecov
        if: always() && steps.build.outcome == 'success'
        uses: codecov/codecov-action@v5
        with:
          files: TestResults/api-coverage.json
          flags: api
          disable_search: true
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: SwiftLint
        if: always()
        run: |
          brew install swiftlint
          swiftlint lint --config .swiftlint.yml --strict
